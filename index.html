<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireMC Store</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/drdonut9898-a11y/Firemc-store/main/favicon.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-primary: #050508; --bg-secondary: #0a0a12; --bg-card: rgba(15,15,25,0.8);
            --bg-glass: rgba(20,20,35,0.5); --border-subtle: rgba(255,255,255,0.08);
            --border-accent: rgba(255,71,87,0.3); --text-primary: #ffffff;
            --text-secondary: #a4b0be; --text-muted: #747d8c;
            --accent-red: #ff4757; --accent-red-glow: rgba(255,71,87,0.4);
            --accent-blue: #00d2ff; --accent-blue-glow: rgba(0,210,255,0.4);
            --accent-green: #2ed573; --accent-green-glow: rgba(46,213,115,0.4);
            --accent-gold: #eab308; --accent-gold-glow: rgba(234,179,8,0.4);
            --accent-purple: #a855f7; --accent-purple-glow: rgba(168,85,247,0.4);
            --accent-discord: #5865F2; --accent-discord-glow: rgba(88,101,242,0.4);
            --accent-donut: #00d2ff; --accent-donut-glow: rgba(0,210,255,0.4);
            --font-display: 'Orbitron',sans-serif; --font-body: 'Rajdhani',sans-serif;
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --transition-smooth: all 0.4s cubic-bezier(0.25,1,0.5,1);
            --sidebar-width: 280px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:var(--font-body); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 80%, rgba(255,71,87,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(0,210,255,0.06) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 60%);
            pointer-events: none; z-index: -1; animation: bgPulse 8s ease-in-out infinite;
        }
        @keyframes bgPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .app-container { max-width:1200px; margin:0 auto; padding:0 20px; }
        .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); z-index: 1000; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.25,1,0.5,1); overflow-y: auto; transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-subtle); }
        .sidebar-brand { font-family: var(--font-display); font-size: 1.8rem; font-weight: 900; color: var(--accent-red); text-shadow: 0 0 20px var(--accent-red-glow); letter-spacing: 3px; }
        .sidebar-brand span { color: var(--text-primary); }
        .sidebar-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-accent), transparent); margin: 10px 20px; }
        .sidebar-section { padding: 15px 20px; }
        .sidebar-section-title { font-family: var(--font-display); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; padding: 0 10px; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 10px; color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: var(--transition-smooth); cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
        .sidebar-link:hover { background: var(--bg-glass); color: var(--accent-red); border-color: var(--border-accent); transform: translateX(5px); }
        .sidebar-link.active { background: linear-gradient(135deg, rgba(255,71,87,0.15), rgba(255,71,87,0.05)); color: var(--accent-red); border-color: var(--border-accent); box-shadow: 0 4px 15px var(--accent-red-glow); }
        .sidebar-link .link-icon { font-size: 1.2rem; width: 28px; text-align: center; }
        .sidebar-category { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; }
        .sidebar-category-firemc { color: var(--accent-red); }
        .sidebar-category-donut { color: var(--accent-donut); }
        .sidebar-category-account { color: var(--accent-green); }
        .sidebar-category-discord { color: var(--accent-discord); }
        .sidebar-category-offers { color: var(--accent-purple); }
        .sidebar-category-admin { color: var(--accent-purple); }
        .sidebar-toggle { position: fixed; top: 20px; left: 20px; z-index: 1001; width: 45px; height: 45px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: var(--transition-smooth); box-shadow: var(--shadow-md); }
        .sidebar-toggle:hover { background: var(--accent-red); color: white; transform: scale(1.1); }
        .sidebar-username { margin: 0 20px 15px; padding: 10px 15px; text-align: center; display: none; }
        .sidebar-username.visible { display: block; }
        .sidebar-username .username-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; }
        .sidebar-username .username-value { font-family: var(--font-body); font-size: 1rem; font-weight: 600; color: var(--text-secondary); }
        .top-navbar { display:flex; justify-content:space-between; align-items:center; padding:20px 0; margin-bottom:20px; flex-wrap:wrap; gap:15px; }
        .nav-brand { font-family:var(--font-display); font-size:1.2rem; font-weight:800; letter-spacing:2px; color:var(--accent-red); text-shadow:0 0 20px var(--accent-red-glow); }
        .nav-actions { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .nav-username { font-family: var(--font-body); font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; display: none; align-items: center; gap: 6px; }
        .nav-username.visible { display: flex; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 20px; border-radius:8px; font-family:var(--font-display); font-size:0.8rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border:none; transition:var(--transition-smooth); position:relative; overflow:hidden; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background:linear-gradient(135deg,var(--accent-red),#ff2e44); color:white; box-shadow:0 4px 15px var(--accent-red-glow); }
        .btn-secondary { background:var(--bg-glass); border:1px solid var(--border-subtle); color:var(--text-secondary); }
        .btn-secondary:hover { border-color:var(--accent-red); color:var(--accent-red); }
        .btn-success { background:linear-gradient(135deg,var(--accent-green),#26af5f); color:white; }
        .btn-blue { background:linear-gradient(135deg,var(--accent-blue),#0088ff); color:white; }
        .btn-gold { background:linear-gradient(135deg,var(--accent-gold),#ca8a04); color:#000; }
        .btn-purple { background:linear-gradient(135deg,var(--accent-purple),#7c3aed); color:white; }
        .btn-discord { background:linear-gradient(135deg,var(--accent-discord),#4752C4); color:white; }
        .btn-donut { background:linear-gradient(135deg,var(--accent-donut),#0088ff); color:white; }
        .btn-danger { background:linear-gradient(135deg,#ef4444,#dc2626); color:white; }
        .btn-sm { padding:6px 14px; font-size:0.7rem; }
        .header-container { text-align:center; margin-bottom:60px; }
        .header-title { font-family:var(--font-display); font-size:clamp(2rem,5vw,3.5rem); font-weight:900; text-transform:uppercase; letter-spacing:6px; }
        .header-title span { color:var(--accent-red); text-shadow:0 0 20px var(--accent-red-glow); }
        .view-section { display:none; opacity:0; transform:translateY(30px) scale(0.98); transition:all 0.5s cubic-bezier(0.25,1,0.5,1); }
        .view-section.active { display:block; opacity:1; transform:translateY(0) scale(1); }
        .back-btn { background:var(--bg-glass); border:1px solid var(--border-accent); color:var(--accent-red); font-family:var(--font-display); font-size:0.85rem; font-weight:700; padding:12px 24px; border-radius:8px; cursor:pointer; transition:var(--transition-smooth); margin-bottom:35px; display:inline-flex; align-items:center; gap:10px; }
        .back-btn:hover { background:var(--accent-red); color:white; transform: translateX(-5px); }
        .home-wrapper { display:grid; grid-template-columns:repeat(2,1fr); gap:30px; max-width:900px; margin:0 auto; }
        .master-card { background:var(--bg-card); border:1px solid var(--border-accent); border-top:4px solid var(--accent-red); border-radius:16px; padding:50px 30px; text-align:center; cursor:pointer; transition:var(--transition-smooth); position: relative; overflow: hidden; }
        .master-card:hover { transform:translateY(-12px) scale(1.03); border-color:var(--accent-red); box-shadow:0 20px 40px rgba(255,71,87,0.2); }
        .master-card h2 { font-family:var(--font-display); font-size:clamp(1.8rem,4vw,2.5rem); letter-spacing:3px; }
        .master-card p { color:var(--text-secondary); text-transform:uppercase; letter-spacing:2px; margin-top:10px; }
        .master-card-blue { border-top-color:var(--accent-blue); border-color:rgba(0,210,255,0.3); }
        .master-card-blue h2 { color:var(--accent-blue); }
        .master-card-blue:hover { border-color:var(--accent-blue); box-shadow:0 20px 40px rgba(0,210,255,0.15); }
        .master-card-green { border-top-color:var(--accent-green); border-color:rgba(46,213,115,0.3); }
        .master-card-green h2 { color:var(--accent-green); }
        .master-card-green:hover { border-color:var(--accent-green); box-shadow:0 20px 40px rgba(46,213,115,0.15); }
        .master-card-discord { border-top-color:var(--accent-discord); border-color:rgba(88,101,242,0.3); }
        .master-card-discord h2 { color:var(--accent-discord); }
        .master-card-discord:hover { border-color:var(--accent-discord); box-shadow:0 20px 40px rgba(88,101,242,0.15); }
        .master-card-donut { border-top-color:var(--accent-donut); border-color:rgba(0,210,255,0.3); }
        .master-card-donut h2 { color:var(--accent-donut); }
        .master-card-donut:hover { border-color:var(--accent-donut); box-shadow:0 20px 40px rgba(0,210,255,0.15); }
        .master-card-purple { border-top-color:var(--accent-purple); border-color:rgba(168,85,247,0.3); }
        .master-card-purple h2 { color:var(--accent-purple); }
        .master-card-purple:hover { border-color:var(--accent-purple); box-shadow:0 20px 40px rgba(168,85,247,0.15); }
        .menu-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:30px; }
        .menu-card { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:45px 35px; text-align:center; cursor:pointer; transition:var(--transition-smooth); }
        .menu-card:hover { transform:translateY(-8px) scale(1.03); border-color:var(--accent-red); box-shadow:0 15px 35px rgba(255,71,87,0.15); }
        .menu-card h3 { font-family:var(--font-display); font-size:1.9rem; color:var(--accent-red); margin-bottom:15px; }
        .menu-card p { color:var(--text-muted); font-size:1.1rem; }
        .search-container { margin-bottom:30px; position:relative; }
        .search-input { width:100%; padding:14px 20px 14px 50px; border-radius:12px; background:var(--bg-card); border:1px solid var(--border-subtle); color:var(--text-primary); font-size:1rem; }
        .search-input:focus { outline:none; border-color:var(--accent-red); box-shadow:0 0 20px rgba(255,71,87,0.1); }
        .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1.2rem; }
        .store-billboard { background:linear-gradient(90deg,rgba(255,71,87,0.08),transparent); border:1px solid var(--border-accent); border-left:5px solid var(--accent-red); padding:25px 30px; border-radius:12px; margin-bottom:35px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
        .billboard-blue { background:linear-gradient(90deg,rgba(0,210,255,0.08),transparent); border-color:rgba(0,210,255,0.3); border-left-color:var(--accent-blue); }
        .billboard-green { background:linear-gradient(90deg,rgba(46,213,115,0.08),transparent); border-color:rgba(46,213,115,0.3); border-left-color:var(--accent-green); }
        .billboard-discord { background:linear-gradient(90deg,rgba(88,101,242,0.08),transparent); border-color:rgba(88,101,242,0.3); border-left-color:var(--accent-discord); }
        .billboard-donut { background:linear-gradient(90deg,rgba(0,210,255,0.08),transparent); border-color:rgba(0,210,255,0.3); border-left-color:var(--accent-donut); }
        .billboard-purple { background:linear-gradient(90deg,rgba(168,85,247,0.08),transparent); border-color:rgba(168,85,247,0.3); border-left-color:var(--accent-purple); }
        .rate-tag { font-size:1.3rem; font-weight:600; color:var(--text-secondary); }
        .rate-tag strong { color:var(--accent-red); font-family:var(--font-display); font-size:1.5rem; }
        .warning-tag { background:rgba(255,71,87,0.1); color:var(--accent-red); border:1px solid var(--border-accent); font-weight:700; padding:8px 18px; border-radius:6px; text-transform:uppercase; font-size:0.9rem; }
        .warning-tag-green { background:rgba(46,213,115,0.1); color:var(--accent-green); border-color:rgba(46,213,115,0.4); }
        .packages-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:25px; margin-bottom:50px; }
        .pkg-card { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:16px; padding:35px 25px; text-align:center; display:flex; flex-direction:column; justify-content:space-between; min-height:300px; position:relative; transition:var(--transition-smooth); }
        .pkg-card:hover { border-color:rgba(255,71,87,0.5); transform:translateY(-10px) scale(1.02); box-shadow:0 20px 40px rgba(255,71,87,0.15); }
        .pkg-val { font-family:var(--font-display); font-size:2rem; font-weight:800; }
        .stock-label { display:inline-block; background:rgba(46,213,115,0.1); color:var(--accent-green); font-size:0.85rem; font-weight:700; padding:5px 14px; border-radius:20px; border:1px solid rgba(46,213,115,0.2); margin-top:10px; }
        .stock-label-low { background:rgba(255,71,87,0.1); color:var(--accent-red); border-color:rgba(255,71,87,0.2); }
        .pkg-cost { font-size:1.8rem; color:var(--accent-red); font-weight:700; background:rgba(255,71,87,0.05); padding:10px 0; border-radius:8px; border:1px solid rgba(255,71,87,0.1); margin:15px 0; }
        .promo-badge { position:absolute; top:15px; right:15px; background:linear-gradient(90deg,var(--accent-gold),#ca8a04); color:#000; font-size:0.7rem; font-weight:900; padding:4px 12px; border-radius:6px; }
        .wishlist-btn { position:absolute; top:15px; left:15px; background:rgba(255,71,87,0.1); border:1px solid rgba(255,71,87,0.2); color:var(--text-muted); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; z-index:3; }
        .wishlist-btn:hover, .wishlist-btn.active { background:var(--accent-red); color:white; border-color:var(--accent-red); }
        .wishlist-panel { position:fixed; top:0; right:-400px; width:380px; max-width:90vw; height:100vh; background:var(--bg-secondary); border-left:1px solid var(--border-subtle); z-index:1000; transition:right 0.4s cubic-bezier(0.25,1,0.5,1); display:flex; flex-direction:column; }
        .wishlist-panel.open { right:0; }
        .wishlist-header { padding:25px; border-bottom:1px solid var(--border-subtle); display:flex; justify-content:space-between; align-items:center; }
        .wishlist-header h3 { font-family:var(--font-display); color:var(--accent-red); }
        .wishlist-items { flex:1; overflow-y:auto; padding:20px; }
        .wishlist-item { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .wishlist-widget { position:fixed; bottom:100px; right:30px; z-index:100; }
        .wishlist-btn-float { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,var(--accent-red),#ff2e44); border:none; color:white; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 20px var(--accent-red-glow); display:flex; align-items:center; justify-content:center; position:relative; }
        .wishlist-count { position:absolute; top:-5px; right:-5px; background:var(--accent-gold); color:#000; font-size:0.75rem; font-weight:900; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .cart-widget { position:fixed; bottom:30px; right:30px; z-index:100; }
        .cart-btn { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,var(--accent-red),#ff2e44); border:none; color:white; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 20px var(--accent-red-glow); display:flex; align-items:center; justify-content:center; position:relative; }
        .cart-count { position:absolute; top:-5px; right:-5px; background:var(--accent-gold); color:#000; font-size:0.75rem; font-weight:900; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .cart-panel { position:fixed; top:0; right:-400px; width:380px; max-width:90vw; height:100vh; background:var(--bg-secondary); border-left:1px solid var(--border-subtle); z-index:1000; transition:right 0.4s cubic-bezier(0.25,1,0.5,1); display:flex; flex-direction:column; }
        .cart-panel.open { right:0; }
        .cart-header { padding:25px; border-bottom:1px solid var(--border-subtle); display:flex; justify-content:space-between; align-items:center; }
        .cart-header h3 { font-family:var(--font-display); }
        .cart-items { flex:1; overflow-y:auto; padding:20px; }
        .cart-item { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .cart-item-info { flex: 1; }
        .cart-item-qty { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-secondary); border-radius: 8px; padding: 4px 12px; margin-top: 8px; }
        .cart-item-qty button { background: none; border: none; color: var(--accent-red); font-size: 1rem; cursor: pointer; font-weight: 700; width: 24px; height: 24px; }
        .cart-item-qty span { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; min-width: 20px; text-align: center; }
        .cart-footer { padding:25px; border-top:1px solid var(--border-subtle); }
        .cart-total { display:flex; justify-content:space-between; font-size:1.2rem; margin-bottom:20px; }
        .cart-total strong { font-family:var(--font-display); color:var(--accent-red); font-size:1.5rem; }
        .cart-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        .cart-overlay.active { opacity:1; pointer-events:auto; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,2,3,0.95); display:flex; justify-content:center; align-items:center; z-index:9999; opacity:0; pointer-events:none; transition:all 0.3s; }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-box { background:var(--bg-card); border:2px solid var(--accent-red); border-radius:20px; padding:40px; max-width:450px; width:92%; text-align:center; }
        .modal-box h2 { font-family:var(--font-display); color:var(--accent-red); margin-bottom:20px; }
        .modal-box p { color:var(--text-secondary); margin-bottom:30px; }
        .payment-input-group { margin:15px 0; text-align:left; }
        .payment-input-group label { display:block; margin-bottom:6px; font-weight:600; color:var(--text-secondary); font-size:0.85rem; }
        .payment-input { width:100%; padding:12px 14px; border-radius:10px; background:var(--bg-secondary); border:1px solid var(--border-subtle); color:var(--text-primary); font-size:0.95rem; }
        .payment-input:focus { outline:none; border-color:var(--accent-green); }
        .discord-btn { display:inline-flex; align-items:center; gap:10px; background:#5865F2; color:white; text-decoration:none; font-size:1rem; font-weight:700; padding:14px 30px; border-radius:10px; margin:10px 0; }
        .modal-dismiss { background:none; border:none; color:var(--text-muted); font-size:0.9rem; cursor:pointer; margin-top:20px; }
        .modal-dismiss:hover { color: var(--accent-red); }
        .reviews-section { margin:60px 0; padding:40px 0; border-top:1px solid var(--border-subtle); }
        .reviews-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .reviews-header h2 { font-family:var(--font-display); color:var(--accent-gold); }
        .reviews-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
        .review-card { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:25px; }
        .review-stars { color:var(--accent-gold); margin-bottom:10px; }
        .review-text { color:var(--text-secondary); }
