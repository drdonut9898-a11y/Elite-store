<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREMC STORE - Redirecting...</title>
    <script>
        // ============================================
        // FIREMC STORE - GitHub Pages SPA Redirect
        // ============================================
        // Clean URL Routing: /items -> /?view=items
        // Isse URL clean dikhta hai: site.com/items
        // ============================================

        (function() {
            var path = window.location.pathname;
            var repo = '/Firemc-store'; // Tera repo name

            // Remove repo prefix
            var cleanPath = path;
            if (cleanPath.indexOf(repo) === 0) {
                cleanPath = cleanPath.substring(repo.length);
            }

            // Remove leading slash
            cleanPath = cleanPath.replace(/^\//, '');

            // If empty, go home
            if (!cleanPath || cleanPath === 'index.html') {
                window.location.replace(
                    window.location.protocol + '//' + 
                    window.location.hostname + 
                    (window.location.port ? ':' + window.location.port : '') + 
                    repo + '/'
                );
                return;
            }

            // Convert to query param: /items -> /?view=items
            var redirectUrl = 
                window.location.protocol + '//' + 
                window.location.hostname + 
                (window.location.port ? ':' + window.location.port : '') + 
                repo + '/?view=' + encodeURIComponent(cleanPath) +
                window.location.hash;

            window.location.replace(redirectUrl);
        })();
    </script>
<base target="_blank">
</head>
<body style="background:#050508; color:#ff4757; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
    <div style="text-align:center;">
        <h2>🔥 FIREMC STORE</h2>
        <p>Redirecting to clean URL...</p>
    </div>
</body>
</html>
